<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurants</title>
</head>
<body>
<link rel="stylesheet" th:href="@{/css/styles.css}">

<div class="button-container">
    <a class="button" th:href="@{/}">Home</a>
    <a class="button" th:href="@{/chefs}">Chefs</a><br>
    <a class="button" th:href="@{/restaurants}">Restaurants</a><br>
    <a class="button" th:href="@{/menuItems}">Menu Items</a>
</div>

<h1>Restaurants</h1>

<ul class="list">
    <li class="each-restaurant" th:each="restaurant : ${restaurants}">
        <span th:text="${restaurant.name} + ' - ' + ${restaurant.location}"></span>
        <span class="actions">
            <a th:href="@{/restaurants/{id}/menu(id=${restaurant.id})}">View Menu</a> |
            <a th:href="@{'/restaurants/edit/' + ${restaurant.id}}">Edit</a> |
            <a th:href="@{'/restaurants/delete/' + ${restaurant.id}}"
               onclick="return confirm('Are you sure you want to delete this restaurant?');">Delete</a>
        </span>
    </li>
</ul>

<form th:action="@{/restaurants/add}" th:object="${restaurant}" method="post">
    <input type="hidden" th:field="*{id}" />

    Name: <input type="text" th:field="*{name}" placeholder="Restaurant Name" required />
    Location: <input type="text" th:field="*{location}" placeholder="Location" required />
    <button type="submit">Add Restaurant</button>
</form>

</body>
</html>
