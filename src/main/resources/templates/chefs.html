<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chefs</title>
</head>
<body>
<link rel="stylesheet" th:href="@{/css/styles.css}">

<div class="button-container">
    <a class="button" th:href="@{/}">Home</a>
    <a class="button" th:href="@{/chefs}">Chefs</a><br>
    <a class="button" th:href="@{/restaurants}">Restaurants</a><br>
    <a class="button" th:href="@{/menuItems}">Menu Items</a>
</div>
<h1>Chefs</h1>

<table border="1">
    <thead>
    <tr>
        <th>Name</th>
        <th>Specialty</th>
        <th>Restaurants</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="chef : ${chefs}">
        <td th:text="${chef.name}"></td>
        <td th:text="${chef.specialty}"></td>

        <td>
                <span th:each="r, iterStat : ${chef.restaurants}">
                    <span th:text="${r.name}"></span>
                    <span th:if="${!iterStat.last}">, </span>
                </span>
        </td>

        <td>
            <a th:href="@{'/chefs/delete/' + ${chef.id}}"
               onclick="return confirm('Are you sure you want to delete this chef?');">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

<h2>Add New Chef</h2>
<form th:action="@{/chefs/add}" th:object="${chef}" method="post">
    Name: <input type="text" th:field="*{name}" placeholder="Chef Name" required />
    Specialty: <input type="text" th:field="*{specialty}" placeholder="Specialty" required />

    <label>Select Restaurants:</label>
    <select th:field="*{restaurantIds}" multiple required>
        <option th:each="r : ${restaurants}"
                th:value="${r.id}"
                th:text="${r.name}">
        </option>
    </select>

    <button type="submit">Add Chef</button>
</form>

</body>
</html>
